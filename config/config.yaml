# BasketballGAN — PyTorch diffusion model configuration
# Override via CLI: python src/train.py --max_epochs 500 --batch_size 32

model:
  n_filters: 256
  n_resblock: 4
  num_heads: 4

training:
  batch_size: 64
  seq_length: 50
  lr_: 1.0e-4
  max_epochs: null      # null = run forever
  checkpoint_step: 100
  vis_freq: 10
  valid_freq: 5         # validate every N epochs (0 = skip)

diffusion:
  T: 1000               # total diffusion timesteps
  beta_start: 0.0001    # linear noise schedule start
  beta_end: 0.02        # linear noise schedule end
  ddim_steps: 50        # DDIM sampling steps

wandb:
  enabled: false
  project: basketballgan
  entity: null
